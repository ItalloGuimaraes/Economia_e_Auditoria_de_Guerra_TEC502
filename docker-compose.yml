# ==============================================================================
# SISTEMA DISTRIBUÍDO: ESTREITO DE ORMUZ
# Arquitetura baseada em Microserviços e Topologia P2P (Peer-to-Peer)
# ==============================================================================

services:

  # ============================================================================
  # CAMADA DE ORQUESTRAÇÃO E CONSENSO (BROKERS P2P)
  # Nós responsáveis por manter o estado global, gerenciar a fila de missões
  # e executar o algoritmo de exclusão mútua distribuída (Ricart-Agrawala).
  # ============================================================================

  broker1:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker-1
    # Port Binding: Exposição TCP para interconexão de rede host-to-container
    ports:
      - "9000:9000"
    environment:
      - BROKER_ID=1
      - BROKER_PORT=:9000
      - MY_ADDR=${ADDR_BROKER_1}
      # Topologia em malha fechada: Inicialização aponta para os demais peers
      - SEED_ADDRS=${ADDR_BROKER_2},${ADDR_BROKER_3},${ADDR_BROKER_4}
    volumes:
      - ./data:/root/data
    networks:
      - ormuz-net

  broker2:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker-2
    ports:
      - "9001:9000"
    environment:
      - BROKER_ID=2
      - BROKER_PORT=:9000
      - MY_ADDR=${ADDR_BROKER_2}
      - SEED_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_3},${ADDR_BROKER_4}
    volumes:
      - ./data:/root/data
    networks:
      - ormuz-net

  broker3:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker-3
    ports:
      - "9002:9000"
    environment:
      - BROKER_ID=3
      - BROKER_PORT=:9000
      - MY_ADDR=${ADDR_BROKER_3}
      - SEED_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_4}
    volumes:
      - ./data:/root/data
    networks:
      - ormuz-net

  broker4:
    build:
      context: .
      args:
        TARGET: broker
    container_name: broker-4
    ports:
      - "9003:9000"
    environment:
      - BROKER_ID=4
      - BROKER_PORT=:9000
      - MY_ADDR=${ADDR_BROKER_4}
      - SEED_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3}
    volumes:
      - ./data:/root/data
    networks:
      - ormuz-net

  # ============================================================================
  # CAMADA DE TELEMETRIA (SENSORES MARÍTIMOS)
  # Produtores de eventos (Event Producers). Injetam anomalias estocásticas
  # no cluster utilizando roteamento de Failover (lista de endpoints).
  # ============================================================================

  sensor_setor_1:
    build:
      context: .
      args:
        TARGET: sensor
    container_name: sensor-1
    environment:
      - BROKER_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3},${ADDR_BROKER_4}
      - SETOR_ID=1
    networks:
      - ormuz-net

  sensor_setor_2:
    build:
      context: .
      args:
        TARGET: sensor
    container_name: sensor-2
    environment:
      - BROKER_ADDRS=${ADDR_BROKER_2},${ADDR_BROKER_1},${ADDR_BROKER_3},${ADDR_BROKER_4}
      - SETOR_ID=2
    networks:
      - ormuz-net

  sensor_setor_3:
    build:
      context: .
      args:
        TARGET: sensor
    container_name: sensor-3
    environment:
      - BROKER_ADDRS=${ADDR_BROKER_3},${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_4}
      - SETOR_ID=3
    networks:
      - ormuz-net

  sensor_setor_4:
    build:
      context: .
      args:
        TARGET: sensor
    container_name: sensor-4
    environment:
      - BROKER_ADDRS=${ADDR_BROKER_4},${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3}
      - SETOR_ID=4
    networks:
      - ormuz-net

  # ============================================================================
  # CAMADA DE TRABALHO (AGENTES DRONES)
  # Nós Workers autônomos. Realizam "Polling" contínuo na infraestrutura de
  # brokers para alocação de missões e emitem sinais de TTL (Heartbeats).
  # ============================================================================

  drone_alpha:
    build:
      context: .
      args:
        TARGET: drone
    container_name: drone-alpha
    environment:
      - DRONE_ID=ALPHA
      - BROKER_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3},${ADDR_BROKER_4}
    networks:
      - ormuz-net

  drone_bravo:
    build:
      context: .
      args:
        TARGET: drone
    container_name: drone-bravo
    environment:
      - DRONE_ID=BRAVO
      - BROKER_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3},${ADDR_BROKER_4}
    networks:
      - ormuz-net

  drone_beta:
    build:
      context: .
      args:
        TARGET: drone
    container_name: drone-beta
    environment:
      - DRONE_ID=BETA
      - BROKER_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3},${ADDR_BROKER_4}
    networks:
      - ormuz-net

  # ============================================================================
  # INTERFACE DE ADMINISTRAÇÃO E TESTES
  # Ferramentas auxiliares para interação humana e validação de consistência.
  # ============================================================================

  cliente:
    build:
      context: .
      args:
        TARGET: cliente
    container_name: cliente
    # TTY/Stdin abertos para habilitar REPL interativo via 'docker compose run'
    stdin_open: true
    tty: true
    environment:
      # Adicionado o ADDR_BROKER_4 que faltava
      - BROKER_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3},${ADDR_BROKER_4}
    # ADICIONADO: Volume para persistir as carteiras das companhias (.pem) no Windows
    volumes:
      - ./data:/root/data
    networks:
      - ormuz-net


  testes:
    build:
      context: .
      args:
        TARGET: testes
    container_name: testes
    environment:
      - BROKER_ADDRS=${ADDR_BROKER_1},${ADDR_BROKER_2},${ADDR_BROKER_3},${ADDR_BROKER_4}
    # Montagem do Docker Socket: Permite ao contêiner de testes manipular
    # o daemon local para rotinas de Engenharia do Caos (derrubar outros nós)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ormuz-net

# ==============================================================================
# TOPOLOGIA VIRTUAL
# ==============================================================================
networks:
  ormuz-net:
    # Rede em bridge garante isolamento da stack do host com resolução de DNS interno
    driver: bridge